package:
  name: ray
  version: 2.42.0

source:
  url: https://files.pythonhosted.org/packages/ec/20/7005bfdf75b9c1815b82cacb18dae1d40a1f8e02b78245aa707adcb27acb/ray-2.42.0-cp312-cp312-manylinux2014_x86_64.whl
  sha256: e3ede0367ab28fbd868a22f4e4cdac44543c654e2cbc5a3b482178e7f725ea2c

build:
  noarch: python
    # script: pip install --no-deps --ignore-installed {{ environ.get('PKG_NAME') }}-{{ environ.get('PKG_VERSION') }}-*.whl
  number: 0
  missing_dso_whitelist:
    - '*/libpthread.so.0'
    - '*/libc.so.6'
    - '*/librt.so.1'
    - '*/libm.so.6'
    - '*/libc.so.6'
    - '*/ld-linux-x86-64.so.2'
    - '*/libdl.so.2'

requirements:
  host:
    - python
    - pip
  run:
    - python
    - numpy  # Ray requires numpy, add more dependencies as needed

about:
  home: https://github.com/ray-project/ray
  license: Apache-2.0
  summary: "A framework for distributed computing."

extra:
  anaconda-services:
    ref: https://anaconda.zendesk.com/agent/tickets/49522
    reason: Dependency for vllm
  recipe-maintainers:
    - ianaobi
